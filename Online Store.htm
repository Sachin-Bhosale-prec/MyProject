<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation Bar -->
<header>
    <h1>My Online Store</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- Categories Section -->
<section class="categories">
    <h2>Shop by Category</h2>
    <div class="category-list">
        <div class="category">Electronics</div>
        <div class="category">Clothing</div>
        <div class="category">Books</div>
        <div class="category">Accessories</div>
    </div>
</section>

<!-- Products Section -->
<section class="products">
    <h2>Featured Products</h2>
    <div class="product-list">

        <div class="product-card">
            <h3>Smartphone</h3>
            <p>₹15,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <h3>T-Shirt</h3>
            <p>₹599</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <h3>Book</h3>
            <p>₹399</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <h3>Headphones</h3>
            <p>₹1,299</p>
            <button>Add to Cart</button>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <p>&copy; 2026 My Online Store. All Rights Reserved.</p>
</footer>

</body>
</html>
